    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // and other Node.js environment shims.
      (function() {
        var g = typeof globalThis !== 'undefined' ? globalThis : window;
        
        // Polyfill global if missing
        if (typeof g.global === 'undefined') {
          g.global = g;
        }

        // Fix fetch getter/setter issue
        try {
          var descriptor = Object.getOwnPropertyDescriptor(g, 'fetch');
          if (descriptor && !descriptor.writable && descriptor.configurable) {
            var _fetch = g.fetch;
            Object.defineProperty(g, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return _fetch; },
              set: function(v) { _fetch = v; }
            });
          }
        } catch (e) {
          console.warn("Fetch polyfill failed:", e);
        }

        // Ensure FormData has keys to prevent some polyfills from running
        if (typeof g.FormData !== 'undefined' && !g.FormData.prototype.keys) {
          g.FormData.prototype.keys = function() { return []; };
        }
      })();
